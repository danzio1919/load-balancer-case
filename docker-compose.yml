
services:
  backend:
    container_name: medsien-case-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./servers.json:/app/servers.json
      - ./requests.csv:/app/requests.csv
      - ./run.jsonl:/app/run.jsonl
      - ./runs:/app/runs
      - ./validate_run.py:/app/validate_run.py
    env_file:
      - .env

  frontend:
    container_name: medsien-case-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
